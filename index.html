<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Fun educational quizzes for Grade 2 students following the Jamaica NSC curriculum">
  <meta name="theme-color" content="#4A90D9">
  
  <title>Learning Adventure 📚</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/quiz.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/math-interactive.css">
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  
  <style>
    /* Page-specific styles */
    .app-header {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-highlight) 100%);
      color: white;
      padding-block: var(--space-md);
      box-shadow: var(--shadow-md);
    }

    .app-header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-md);
    }

    .app-logo {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-family: var(--font-family-display);
      font-size: var(--font-size-xl);
      font-weight: 700;
      color: white;
      text-decoration: none;
    }

    .app-logo__icon {
      font-size: 2rem;
    }

    .app-nav {
      display: flex;
      gap: var(--space-md);
      align-items: center;
    }

    .app-nav__btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.3);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-full);
      font-family: var(--font-family);
      font-size: var(--font-size-sm);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }

    .app-nav__btn:hover {
      background: rgba(255, 255, 255, 0.3);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .app-main {
      flex: 1;
      padding-block: var(--space-xl);
    }

    .app-footer {
      text-align: center;
      padding-block: var(--space-lg);
      color: var(--color-text-muted);
      font-size: var(--font-size-sm);
      border-block-start: 1px solid var(--color-border);
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-block-size: 300px;
      gap: var(--space-lg);
    }

    .loading__text {
      font-size: var(--font-size-lg);
      color: var(--color-text-muted);
    }

    /* Sound toggle */
    .sound-toggle {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      padding: var(--space-xs);
      border-radius: var(--radius-full);
      transition: transform var(--transition-fast);
    }

    .sound-toggle:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Header -->
    <header class="app-header">
      <div class="container">
        <a href="/" class="app-logo" id="home-btn">
          <span class="app-logo__icon">📚</span>
          <span>Learning Adventure</span>
        </a>
        
        <nav class="app-nav">
          <a href="workbook-review.html" class="app-nav__btn">
            <span>📖</span>
            <span>Workbooks</span>
          </a>
          <button class="sound-toggle" id="sound-toggle" title="Toggle sound" aria-label="Toggle sound">
            🔊
          </button>
          <button class="app-nav__btn" id="progress-btn">
            <span>⭐</span>
            <span id="star-count">0</span>
          </button>
        </nav>
      </div>
    </header>

    <!-- Main Content -->
    <main class="app-main">
      <div class="container" id="main-content">
        <!-- Loading state -->
        <div class="loading">
          <div class="spinner"></div>
          <p class="loading__text">Loading your quizzes...</p>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <div class="container">
        <p>Made with ❤️ | Grade 2 Jamaica NSC Curriculum</p>
      </div>
    </footer>
  </div>

  <!-- Name Prompt Modal -->
  <div id="name-modal" class="modal" style="display: none;">
    <div class="modal__overlay"></div>
    <div class="modal__content">
      <div class="modal__icon">👋</div>
      <h2 class="modal__title">Welcome to Learning Adventure!</h2>
      <p class="modal__text">What's your name, superstar?</p>
      <form id="name-form" class="modal__form">
        <input 
          type="text" 
          id="name-input" 
          class="modal__input" 
          placeholder="Enter your name..." 
          maxlength="20"
          autocomplete="off"
          required
        >
        <button type="submit" class="btn btn--primary modal__btn">
          Let's Go! 🚀
        </button>
      </form>
    </div>
  </div>

  <style>
    /* Name Prompt Modal Styles */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-md);
    }

    .modal__overlay {
      position: absolute;
      inset: 0;
      background: oklch(20% 0.02 250 / 0.8);
      backdrop-filter: blur(4px);
    }

    .modal__content {
      position: relative;
      background: var(--color-card);
      border-radius: var(--radius-xl);
      padding: var(--space-2xl);
      max-inline-size: 400px;
      inline-size: 100%;
      text-align: center;
      box-shadow: var(--shadow-xl);
      animation: modal-pop 0.4s ease;
    }

    @keyframes modal-pop {
      0% {
        opacity: 0;
        transform: scale(0.8) translateY(20px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal__icon {
      font-size: 4rem;
      margin-block-end: var(--space-md);
      animation: wave 1s ease-in-out infinite;
    }

    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(20deg); }
      75% { transform: rotate(-20deg); }
    }

    .modal__title {
      font-family: var(--font-family-display);
      font-size: var(--font-size-2xl);
      color: var(--color-text);
      margin-block-end: var(--space-sm);
    }

    .modal__text {
      font-size: var(--font-size-lg);
      color: var(--color-text-muted);
      margin-block-end: var(--space-lg);
    }

    .modal__form {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .modal__input {
      padding: var(--space-md) var(--space-lg);
      font-size: var(--font-size-lg);
      font-family: var(--font-family-body);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-lg);
      text-align: center;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .modal__input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--color-primary) 20%, transparent);
    }

    .modal__btn {
      font-size: var(--font-size-lg);
      padding: var(--space-md) var(--space-xl);
    }
  </style>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/quiz-engine.js"></script>
  <script src="js/math-interactive.js"></script>
  <script src="js/app.js"></script>
  
  <script>
    // Sound toggle functionality
    document.getElementById('sound-toggle').addEventListener('click', function() {
      const settings = Storage.loadSettings();
      settings.soundEnabled = !settings.soundEnabled;
      Storage.saveSettings(settings);
      Feedback.settings.soundEnabled = settings.soundEnabled;
      this.textContent = settings.soundEnabled ? '🔊' : '🔇';
    });

    // Initialize sound toggle state and check for first-time user
    document.addEventListener('DOMContentLoaded', function() {
      const settings = Storage.loadSettings();
      document.getElementById('sound-toggle').textContent = settings.soundEnabled ? '🔊' : '🔇';
      
      // Update star count
      const progress = Storage.loadProgress();
      document.getElementById('star-count').textContent = progress.totalStars || 0;

      // Show name modal for first-time users
      if (Storage.isFirstTimeUser()) {
        document.getElementById('name-modal').style.display = 'flex';
        document.getElementById('name-input').focus();
      }
    });

    // Handle name form submission
    document.getElementById('name-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const nameInput = document.getElementById('name-input');
      const name = nameInput.value.trim();
      
      if (name) {
        Storage.saveName(name);
        document.getElementById('name-modal').style.display = 'none';
        
        // Refresh the welcome message if it exists
        if (typeof App !== 'undefined' && App.renderHomeScreen) {
          App.renderHomeScreen();
        }
      }
    });
  </script>
</body>
</html>
