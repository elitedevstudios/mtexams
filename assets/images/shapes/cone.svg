<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="coneGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="50%" stop-color="#FFCC66"/>
      <stop offset="100%" stop-color="#E5A03F"/>
    </linearGradient>
  </defs>
  <!-- Cone body -->
  <polygon points="50,10 85,80 15,80" fill="url(#coneGrad)" stroke="#D4943A" stroke-width="2"/>
  <!-- Base ellipse -->
